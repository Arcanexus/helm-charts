{{- if .Values.teslamate.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app.fullname" . }}-teslamate
  annotations:
    {{- if .Values.teslamate.ingress.annotations }}
    {{- toYaml .Values.teslamate.ingress.annotations | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.teslamate.ingress.ingressClassName }}
  tls:
    - hosts:
        - {{ .Values.teslamate.ingress.host }}
      secretName: {{ include "app.name" . }}-tls
  rules:
    - host: {{ .Values.teslamate.ingress.host }}
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: {{ include "app.fullname" . }}-grafana
                port:
                  number: {{ .Values.grafana.service.port }}
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "app.fullname" . }}-teslamate
                port:
                  number: {{ .Values.teslamate.service.port }}
{{- end }}
