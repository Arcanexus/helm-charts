apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-mosquitto
  labels:
    app.kubernetes.io/name: {{ include "app.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mosquitto
    helm.sh/chart: {{ include "app.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.mosquitto.replicas }}
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: mosquitto
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: {{ .Values.mosquitto.image | quote }}
          imagePullPolicy: {{ .Values.mosquitto.pullPolicy }}
          {{- if .Values.mosquitto.command }}
          command: {{ .Values.mosquitto.command | splitList " " | toJson }}
          {{- end }}
          ports:
            - name: mqtt
              containerPort: {{ .Values.mosquitto.service.port }}
          volumeMounts:
            {{- range .Values.mosquitto.volumes }}
            - name: {{ .name }}
              mountPath: {{ .containerMountPath }}
            {{- end }}
      volumes:
        {{- range .Values.mosquitto.volumes }}
        - name: {{ .name }}
          nfs:
            server: {{ .server | quote }}
            path: {{ .path }}
        {{- end }}
