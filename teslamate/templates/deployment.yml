apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-teslamate
  labels:
    app.kubernetes.io/name: {{ include "app.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: teslamate
    helm.sh/chart: {{ include "app.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.telsamate.replicas }}
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: teslamate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: teslamate
    spec:
      {{- with .Values.telsamate.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: teslamate
          image: {{ .Values.telsamate.image | quote }}
          imagePullPolicy: {{ .Values.telsamate.pullPolicy }}
          securityContext:
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.telsamate.service.port }}
          env:
            - name: DATABASE_HOST
              value: database
            {{- range $key, $value := .Values.telsamate.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            {{- range .Values.telsamate.volumes }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
      volumes:
        {{- range .Values.telsamate.volumes }}
        - name: {{ .name }}
          nfs:
            server: {{ .server | quote }}
            path: {{ .path }}
        {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-database
  labels:
    app.kubernetes.io/name: {{ include "app.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: database
    helm.sh/chart: {{ include "app.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.database.replicas }}
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: database
          image: {{ .Values.database.image | quote }}
          imagePullPolicy: {{ .Values.database.pullPolicy }}
          ports:
            - name: postgres
              containerPort: {{ .Values.database.service.port }}
          env:
            {{- range $key, $value := .Values.database.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: database
              mountPath: {{ .Values.database.volumes.database.containerMountPath }}
          resources:
            requests:
              memory: {{ .Values.database.shmSize }}
      volumes:
        - name: database
          nfs:
            server: {{ .Values.database.volumes.database.server | quote }}
            path: {{ .Values.database.volumes.database.path }}
---
