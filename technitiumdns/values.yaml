technitiumdns:
  # nodeSelector:
  #   silent: fanless
  volumes:
    - name: config
      server: 192.168.2.50
      path: /volume2/docker/technitiumDNS/config
      mountPath: /etc/dns

  replicas: 1
  image: technitium/dns-server:14.3.0
  pullPolicy: IfNotPresent

  env:
    TZ: Europe/Paris
    DNS_SERVER_DOMAIN: ns2.arcanexus.com
    DNS_SERVER_ADMIN_PASSWORD: PLACEHOLDER_PASSWORD
    DNS_SERVER_FORWARDERS: "9.9.9.10, 149.112.112.10"
    # DNS_SERVER_ADMIN_PASSWORD_FILE: password.txt
    # DNS_SERVER_PREFER_IPV6: "false"
    # DNS_SERVER_WEB_SERVICE_HTTP_PORT: "5380"
    # DNS_SERVER_WEB_SERVICE_HTTPS_PORT: "53443"
    # DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS: "false"
    # DNS_SERVER_WEB_SERVICE_USE_SELF_SIGNED_CERT: "false"
    # DNS_SERVER_OPTIONAL_PROTOCOL_DNS_OVER_HTTP: "false"
    # DNS_SERVER_RECURSION: AllowOnlyForPrivateNetworks
    # DNS_SERVER_RECURSION_DENIED_NETWORKS: 1.1.1.0/24
    # DNS_SERVER_RECURSION_ALLOWED_NETWORKS: "127.0.0.1, 192.168.2.0/24"
    # DNS_SERVER_ENABLE_BLOCKING: "false"
    # DNS_SERVER_ALLOW_TXT_BLOCKING_REPORT: "false"
    # DNS_SERVER_BLOCK_LIST_URLS: ""
    # DNS_SERVER_FORWARDER_PROTOCOL: Tcp
    # DNS_SERVER_LOG_USING_LOCAL_TIME: "true"

  service:
    ports:
      - name: web-http
        port: 5380
        targetPort: 5380
        protocol: TCP
      - name: web-https
        port: 53443
        targetPort: 53443
        protocol: TCP
      - name: dns-udp
        port: 54
        targetPort: 53
        protocol: UDP
      - name: dns-tcp
        port: 54
        targetPort: 53
        protocol: TCP
      - name: doq-udp
        port: 853
        targetPort: 853
        protocol: UDP
      - name: dot-tcp
        port: 853
        targetPort: 853
        protocol: TCP
      - name: doh-udp
        port: 443
        targetPort: 443
        protocol: UDP
      - name: doh-tcp
        port: 443
        targetPort: 443
        protocol: TCP
      - name: doh-http
        port: 80
        targetPort: 80
        protocol: TCP
      - name: doh-proxy
        port: 8053
        targetPort: 8053
        protocol: TCP
      - name: dhcp
        port: 67
        targetPort: 67
        protocol: UDP

  ingress:
    enabled: true
    host: ns2.arcanexus.com
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: le-wildcard-issuer
      # traefik.ingress.kubernetes.io/router.middlewares: tinyauth-tinyauth@kubernetescrd
