{{- if .Values.transmute.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app.name" . }}
  annotations:
    {{- if .Values.transmute.ingress.annotations }}
    {{- toYaml .Values.transmute.ingress.annotations | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.transmute.ingress.ingressClassName }}
  tls:
    - hosts:
        - {{ .Values.transmute.ingress.host }}
      secretName: {{ include "app.name" . }}-tls
  rules:
    - host: {{ .Values.transmute.ingress.host }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: {{ .Values.transmute.port }}
{{- end }}
