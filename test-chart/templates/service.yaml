{{- if .Values.testapp.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "app.fullname" . }}
    helm.sh/chart: {{ include "app.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ .Values.testapp.service.type }}
  ports:
  - name: http
    port: {{ .Values.testapp.service.port }}
    targetPort: {{ .Values.testapp.service.targetPort }}
  selector:
    app: {{ include "app.fullname" . }}
{{- end }}
