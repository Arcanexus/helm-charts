apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "app.fullname" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "app.fullname" . }}
    helm.sh/chart: {{ include "app.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager-common
    kind: ClusterSecretStore
  target:
    name: {{ include "app.fullname" . }}-secrets
    creationPolicy: Owner
  data:
  - secretKey: DEFAULT_PASSWORD
    remoteRef:
      key: DEFAULT_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ printf "%s-secrets" (include "app.fullname" .) | quote }}
  labels:
    app.kubernetes.io/name: {{ include "app.fullname" . | quote }}
    helm.sh/chart: {{ include "app.chart" . | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: parameterstore
    kind: ClusterSecretStore
  target:
    name: {{ printf "%s-secrets" (include "app.fullname" .) | quote }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: test-secret

