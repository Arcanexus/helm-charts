{{- if .Values.customIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app.name" . }}
  annotations:
    {{- if .Values.customIngress.annotations }}
    {{- toYaml .Values.customIngress.annotations | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.customIngress.ingressClassName | default "traefik" }}
  tls:
    - hosts:
        - {{ .Values.customIngress.host }}
      secretName: {{ include "app.name" . }}-tls
  rules:
    - host: {{ .Values.customIngress.host }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "app.name" . }}
                port:
                  number: {{ .Values.service.main.ports.http.port }}
{{- end }}
