{{- if .Values.volume.giteaDB }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitea-db-pv
spec:
  capacity:
    storage: {{ .Values.volume.giteaDB.storage | quote }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-static
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: {{ .Values.volume.giteaDB.server | quote }}
    path: {{ .Values.volume.giteaDB.path | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.volume.giteaDB.claimName | quote }}
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-static
  resources:
    requests:
      storage: {{ .Values.volume.giteaDB.storage | quote }}
{{- end }}

