apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tailscale-router.fullname" . }}
  labels:
    {{- include "tailscale-router.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "tailscale-router.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tailscale-router.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tailscale-router.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # ip_forward is per-netns, so enabling it here (privileged initContainer
      # sharing the pod's network namespace) is enough — no hostNetwork needed.
      initContainers:
        - name: sysctl
          image: busybox:1.36
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              sysctl -w net.ipv4.ip_forward=1
              sysctl -w net.ipv6.conf.all.forwarding=1
      containers:
        - name: tailscale
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          env:
            - name: TS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-aws-secrets" (include "tailscale-router.fullname" .) | quote }}
                  key: tailscale_client_id
            - name: TS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-aws-secrets" (include "tailscale-router.fullname" .) | quote }}
                  key: tailscale_client_secret
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.uid
            - name: TS_HOSTNAME
              value: {{ .Values.tailscale.hostname | quote }}
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_USERSPACE
              value: "false"
            {{- if .Values.tailscale.loginServer }}
            - name: TS_LOGIN_SERVER
              value: {{ .Values.tailscale.loginServer | quote }}
            {{- end }}
            {{- $tailscaleArgs := list -}}
            {{- if .Values.tailscale.advertiseTags }}
            {{- $tailscaleArgs = append $tailscaleArgs (printf "--advertise-tags=%s" .Values.tailscale.advertiseTags) -}}
            {{- end }}
            {{- if .Values.tailscale.advertiseRoutes }}
            {{- $tailscaleArgs = append $tailscaleArgs (printf "--advertise-routes=%s" .Values.tailscale.advertiseRoutes) -}}
            {{- end }}
            {{- if .Values.tailscale.advertiseExitNode }}
            {{- $tailscaleArgs = append $tailscaleArgs "--advertise-exit-node" -}}
            {{- end }}
            {{- $tailscaleArgs = append $tailscaleArgs (printf "--accept-dns=%t" .Values.tailscale.acceptDNS) -}}
            {{- if .Values.tailscale.extraArgs }}
            {{- $tailscaleArgs = append $tailscaleArgs .Values.tailscale.extraArgs -}}
            {{- end }}
            - name: TS_EXTRA_ARGS
              value: {{ join " " $tailscaleArgs | quote }}
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
            - name: state
              mountPath: /var/lib/tailscale
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: state
          {{- if .Values.persistence.enabled }}
          nfs:
            server: {{ .Values.persistence.nfs.server | quote }}
            path: {{ .Values.persistence.nfs.path | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
